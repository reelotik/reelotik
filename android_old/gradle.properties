# Java Home
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Performance & JVM Settings
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+IgnoreUnrecognizedVMOptions --add-opens=java.base/java.lang=ALL-UNNAMED

# Android & Gradle Settings
android.useAndroidX=true
android.enableJetifier=true
